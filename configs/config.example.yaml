# GitOps MCP Server 配置示例
# 环境变量优先级高于此配置文件

server:
  transport: stdio      # stdio | sse
  port: "18080"         # 仅 SSE 模式生效
  # api_key: ""         # SSE 模式 API Key（可选）

github:
  # Token 优先从环境变量 GITHUB_TOKEN 读取
  # token: "${GITHUB_TOKEN}"
  default_owner: ""     # 默认仓库所有者

  # 多 Token 配置（可选）
  # tokens:
  #   - name: personal
  #     token: "${GITHUB_TOKEN}"
  #     default: true
  #   - name: org-bot
  #     token: "${ORG_BOT_TOKEN}"

  # 监控仓库列表（Phase 4 使用）
  # watched_repos:
  #   - owner: kubernetes
  #     repo: kubernetes
  #     watch_issues: true
  #     watch_releases: true

cache:
  backend: memory       # memory
  ttl:
    repo_structure: "1h"
    file_content: "5m"
    issue_list: "2m"

log:
  level: info           # debug | info | warn | error
  format: text          # text | json
