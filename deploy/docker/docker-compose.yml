# GitOps MCP Server - Docker Compose 部署
# 使用方式：
#   复制 .env.example 为 .env 并填写配置
#   docker compose up -d

services:
  gitops-mcp:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    container_name: gitops-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-18080}:18080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_DEFAULT_OWNER=${GITHUB_DEFAULT_OWNER:-}
      - MCP_TRANSPORT=sse
      - MCP_PORT=18080
      - MCP_API_KEY=${MCP_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    # 可选：挂载配置文件（如果用配置文件方式）
    # volumes:
    #   - ../config.yaml:/etc/gitops-mcp/config.yaml:ro
    # command: ["--config", "/etc/gitops-mcp/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
