apiVersion: v1
kind: ConfigMap
metadata:
  name: gitops-mcp-config
  namespace: gitops-mcp
  labels:
    app.kubernetes.io/name: gitops-mcp-server
data:
  # 非敏感配置项
  GITHUB_DEFAULT_OWNER: ""
  MCP_TRANSPORT: "sse"
  MCP_PORT: "18080"
  LOG_LEVEL: "info"

  # 可选：挂载为配置文件的内容
  config.yaml: |
    server:
      transport: sse
      port: "18080"
    github:
      default_owner: ""
    cache:
      backend: memory
      ttl:
        repo_structure: "1h"
        file_content: "5m"
        issue_list: "2m"
    log:
      level: info
      format: text
